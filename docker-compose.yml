services:
  bot:
    build: .
    container_name: hr-screening-bot
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Монтируем файл учетных данных отдельно, чтобы он был доступен в контейнере
      - ./app/google_credentials.json:/app/app/google_credentials.json
    command: python -m app.main
